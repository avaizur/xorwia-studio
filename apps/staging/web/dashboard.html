<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Dashboard | AI Repurposer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #030014;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --accent-pink: #ff00ea;
            --green: #00ff88;
            --text-primary: #fff;
            --text-secondary: #b4b4b4;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(255, 0, 234, 0.05), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0, 242, 254, 0.05), transparent 40%);
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .navbar {
            padding: 1.5rem 3rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 0, 20, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .input-group {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        input[type="text"] {
            width: 100%;
            max-width: 600px;
            padding: 1.2rem 1.5rem;
            margin-top: 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: var(--transition);
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        button {
            background: linear-gradient(45deg, var(--accent), var(--accent-pink));
            color: black;
            border: none;
            padding: 1.2rem 2.5rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            font-family: 'Outfit', sans-serif;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }

        button:disabled {
            background: #333;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .results-section {
            margin-top: 4rem;
            display: none;
        }

        .hook-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .hook-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            position: relative;
            transition: var(--transition);
        }

        .hook-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .tag {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--accent-pink);
            color: white;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .time-badge {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .reason {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            min-height: 50px;
        }

        .btn-crop {
            width: 100%;
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 0.8rem;
            font-size: 0.9rem;
            margin-top: auto;
        }

        .btn-crop:hover {
            background: rgba(0, 255, 136, 0.1);
            transform: translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 242, 254, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin: 3rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">NOVA SERVERLESS</div>
        <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-secondary);">&bull; API LIVE</div>
    </nav>

    <div class="container">
        <div class="input-group">
            <h2>The Viral Hook Engine</h2>
            <p style="color: var(--text-secondary);">Powered by Amazon Bedrock (Claude 3) & Serverless FFmpeg.</p>
            <input type="text" id="videoUrl" placeholder="Paste YouTube Video URL here (e.g. https://www.youtube.com/watch?v=...)">
            <br>
            <button id="analyzeBtn" onclick="analyzeVideo()">Extract Viral Hooks</button>
        </div>

        <div class="spinner" id="mainSpinner"></div>

        <div class="results-section" id="resultsSection">
            <h2 style="display: flex; align-items: center; gap: 10px;">
                🎯 AI Extracted Hooks 
                <span style="font-size: 0.8rem; background: rgba(0,242,254,0.1); padding: 4px 10px; border-radius: 20px; color: var(--accent);">Ready for CapCut</span>
            </h2>
            <div class="hook-grid" id="hookGrid">
                <!-- Dynamically injected via JS -->
            </div>
        </div>
    </div>

    <script>
        async function analyzeVideo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            if (!urlInput) return alert('Please enter a valid YouTube URL');

            const btn = document.getElementById('analyzeBtn');
            const spinner = document.getElementById('mainSpinner');
            const resultsSection = document.getElementById('resultsSection');
            const grid = document.getElementById('hookGrid');

            // UI Reset
            btn.disabled = true;
            btn.innerText = "Analyzing Transcript with Bedrock...";
            spinner.style.display = 'block';
            resultsSection.style.display = 'none';
            grid.innerHTML = '';

            try {
                // Call our AWS Lambda / Express API
                const res = await fetch('/api/analyze-hooks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ videoUrl: urlInput })
                });

                const data = await res.json();
                
                if (data.success && data.recommendations) {
                    renderHooks(data.recommendations, urlInput);
                    resultsSection.style.display = 'block';
                } else {
                    alert('Error: ' + (data.error || 'Failed to analyze video.'));
                }
            } catch (err) {
                console.error(err);
                alert('API Connection Error. Is your server running?');
            } finally {
                btn.disabled = false;
                btn.innerText = "Extract Viral Hooks";
                spinner.style.display = 'none';
            }
        }

        // Convert seconds to MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function renderHooks(hooks, sourceUrl) {
            const grid = document.getElementById('hookGrid');
            
            hooks.forEach(hook => {
                const card = document.createElement('div');
                card.className = 'hook-card';
                card.innerHTML = `
                    <div class="tag">${hook.tag || 'Trending'}</div>
                    <div class="time-badge">${formatTime(hook.time)}</div>
                    <p class="reason">${hook.reason}</p>
                    <button class="btn-crop" id="cropBtn-${hook.time}" onclick="createVerticalClip('${sourceUrl}', ${hook.time}, this)">
                        🎬 Crop to 9:16 (CapCut)
                    </button>
                    <div id="status-${hook.time}" style="margin-top: 10px; font-size: 0.8rem; color: var(--accent); text-align: center;"></div>
                `;
                grid.appendChild(card);
            });
        }

        async function createVerticalClip(url, startTime, buttonElement) {
            const statusDiv = document.getElementById(`status-${startTime}`);
            
            // UI Feedback
            buttonElement.disabled = true;
            buttonElement.innerText = "⚡ Processing on AWS...";
            statusDiv.innerText = "Downloading segment & applying 9:16 FFmpeg crop...";

            try {
                const res = await fetch('/api/create-clip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ videoUrl: url, startTime: startTime })
                });

                const data = await res.json();
                
                if (data.success) {
                    statusDiv.innerHTML = `<a href="${data.downloadUrl}" target="_blank" style="color: var(--green); font-weight: bold; text-decoration: underline;">✅ Download High-Res MP4</a>`;
                    buttonElement.innerText = "Re-Generate";
                    buttonElement.style.border = "1px solid #333";
                    buttonElement.style.color = "#888";
                } else {
                    statusDiv.innerHTML = `<span style="color: red;">❌ Failed: ${data.error}</span>`;
                    buttonElement.innerText = "Try Again";
                }
            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = `<span style="color: red;">❌ Network Error</span>`;
                buttonElement.innerText = "Try Again";
            } finally {
                buttonElement.disabled = false;
            }
        }
    </script>
</body>
</html>
